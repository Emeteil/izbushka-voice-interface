environment_variables:
  - GEMINI_API_KEY
  - GEMINI_PROXY
  - MASTER_TOKEN

storage_folder: "storage"

knowledge_base_repo: "https://raw.githubusercontent.com/Emeteil/izbushka-knowledge-base/main"

knowledge_base:
  yaml_path: "knowledge_base/sibsutis.yml"
  docs_dir: "knowledge_base/docs"
  missing_log_path: "storage/missing_info.json"

event_memory:
  facts_path: "storage/event_facts.json"
  session_idle_reset_sec: 45
  max_history_messages: 40

wake_word_settings:
  model_name: "wake_word_models/alexa_v0.1.onnx"
  threshold: 0.4
  cooldown_sec: 3.0
  init_delay_sec: 3.0

assistant_settings:
  silence_timeout: 60
  enable_ducking: true

web_core:
  host: "127.0.0.1"
  port: 80
  reconnect_interval: 5.0

load_dotenv: true