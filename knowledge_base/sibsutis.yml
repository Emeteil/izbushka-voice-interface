frequently_asked:
  - q: "Можно ли подать документы онлайн?"
    a: "Да, обычно доступны онлайн-способы подачи, включая Госуслуги и личный кабинет абитуриента."
  - q: "Какие документы нужны?"
    a: "Обычно нужны паспорт, документ об образовании, СНИЛС, фотографии и результаты ЕГЭ или вступительных испытаний."
  - q: "Есть ли военная кафедра?"
    a: "На программе специалитета 11.05.01 указана возможность обучения в ВУЦ (Военном учебном центре). Для остальных форм требуется уточнение."
  - q: "Какое самое популярное направление?"
    a: "Чаще всего востребованы направления, связанные с программированием, информатикой и телекоммуникациями."
  - q: "Сколько стоит обучение?"
    a: "Стоимость варьируется от 32 500 руб. (заочная радиотехника) до 105 000 руб. (очная магистратура) в семестр."
  - q: "Есть ли военная кафедра (военный учебный центр)?"
    a: |
      Да, в СибГУТИ есть Военный учебный центр (ВУЦ). Он реализует несколько программ подготовки:
      - **Для поступающих на специалитет:** целевая подготовка для службы по контракту по специальностям 11.05.01 и 10.05.02 (срок обучения — 5,5 лет). Набор — с 1 сентября 2026 года.
      - **Для студентов 2 курса:** конкурсный отбор для подготовки офицеров (с фев. 2027), сержантов и солдат запаса (с сент. 2026). Отбор проходит среди студентов очных отделений Институтов телекоммуникаций, безопасности и ИВТ.
      Контактный телефон ВУЦ: +7 (383) 269-82-96.
  - q: "Можно ли учиться полностью дистанционно?"
    a: "Да, в СибГУТИ реализуются программы заочного обучения с применением дистанционных технологий. Срок обучения зависит от вашего предыдущего образования (от 2,5 до 5 лет). Приём документов на дистанционное обучение начинается 20 июня, а заключить договор и оплатить первый семестр нужно до 22 августа. 
